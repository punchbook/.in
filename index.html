<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punch Book - Select Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2b589b 0%, #3a82f6 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 80px 30px 40px; 
            margin-top: 60px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: relative;
        }

        /* FLOATING LOGO */
        .logo-container {
            position: absolute;
            top: -80px; 
            left: 50%;
            transform: translateX(-50%);
        }

        .logo-wrapper {
            background: transparent;
        }

        .logo {
            width: 240px; 
            height: auto;
            display: block;
            /* 3D Tilt */
            transform: perspective(900px) rotateX(12deg) rotateY(-10deg) scale(1.05);
            /* HD Look */
            image-rendering: -webkit-optimize-contrast;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.35));
            transition: all 0.4s ease;
        }

        .logo:hover {
            transform: perspective(900px) rotateX(0deg) rotateY(0deg) scale(1.1);
        }

        .app-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            width: 100%;
            padding: 13px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
        }

        .btn-secondary {
            background: #f8fafc;
            color: #334155;
            border: 1px solid #e2e8f0;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
        }

        /* LOADER */
        #loader-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #2b589b, #3a82f6);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f1f5f9;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-weight: 600;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .timer-text {
            font-size: 14px;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        #countdown-number {
            color: #e11d48;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Loading Screen -->
    <div id="loader-overlay">
        <div class="card-container">
            <div class="card" style="margin-top: 0; max-width: 300px; padding: 40px 30px;">
                <div class="spinner"></div>
                <p id="loading-message" class="loading-text">Connecting...</p>
                <div class="timer-text">
                    Redirecting in <span id="countdown-number">10</span>s
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="card-container">
        <div class="card">
            <div class="logo-container">
                <div class="logo-wrapper">
                    <img src="punchbook_logo.png" class="logo" alt="Punch Book Logo">
                </div>
            </div>

            <h1 class="app-title">Punch Book</h1>
            <p class="subtitle">Select a portal to continue</p>

            <div class="button-group">
                <button class="btn btn-primary" onclick="handleNavigation('Admin')">
                    Admin Portal
                </button>
                <button class="btn btn-secondary" onclick="handleNavigation('Employee')">
                    Employee Portal
                </button>
                <button class="btn btn-success" onclick="handleNavigation('Employee Punch')">
                    Employee Punch
                </button>
            </div>
        </div>
    </div>

    <script>
        function handleNavigation(type) {
            document.getElementById('loader-overlay').style.display = 'flex';
            document.getElementById('loading-message').innerText = "Connecting to " + type;

            let time = 10;
            let el = document.getElementById('countdown-number');
            el.innerText = time;

            let t = setInterval(() => {
                time--;
                el.innerText = time;

                if (time <= 0) {
                    clearInterval(t);

                    if (type === 'Admin')
                        window.location.href = 'https://mranalyst01.github.io/Punch-Book/admin/';
                    else if (type === 'Employee')
                        window.location.href = 'https://mranalyst01.github.io/Punch-Book/employee-portal/';
                    else
                        window.location.href = 'https://mranalyst01.github.io/Punch-Book/employee-punch/';
                }
            }, 1000);
        }
    </script>
</body>
</html>
