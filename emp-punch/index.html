<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punch Book - Auto Kiosk Mode</title>
  <link rel="icon" type="image/png" href="punchbook_logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #3B82F6; --success: #10B981; --warning: #F59E0B; --danger: #EF4444;
      --gray-50: #F9FAFB; --gray-200: #E5E7EB; --gray-500: #6B7280; --gray-900: #111827;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #3B82F6 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .punch-container {
      background: white; border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      width: 100%; max-width: 520px; position: relative; margin-top: 45px; overflow: visible;
    }
    .logo-container { position: absolute; top: -50px; left: 50%; transform: translateX(-50%); z-index: 10; }
    .logo {
      width: 170px; height: auto; display: block;
      transform: perspective(900px) rotateX(12deg) rotateY(-10deg) scale(1.05);
      filter: drop-shadow(0 14px 22px rgba(0,0,0,0.30)); transition: all 0.4s ease;
    }
    .punch-header {
      background: linear-gradient(135deg, #1e40af 0%, #3B82F6 100%);
      padding: 58px 30px 16px; text-align: center; color: white; border-radius: 24px 24px 0 0;
    }
    .punch-header h1 { font-size: 22px; margin-bottom: 4px; }
    .datetime-display { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 16px; margin-top: 10px; }
    .datetime-display .time { font-size: 26px; font-weight: 700; letter-spacing: 2px; }
    .punch-body { padding: 16px 20px 24px; }
    
    .camera-section { text-align: center; }
    .video-wrapper {
      position: relative; width: 100%; max-width: 100%; margin: 0 auto;
      border-radius: 14px; overflow: hidden; background: #000; aspect-ratio: 4/3;
    }
    .video-wrapper video { width: 100%; height: 100%; object-fit: cover; }
    .video-wrapper canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    .status-message { margin-top: 20px; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 500; text-align: center; transition: all 0.3s; }
    .status-message.loading { background: #FEF3C7; color: #D97706; }
    .status-message.success { background: #D1FAE5; color: #059669; }
    .status-message.error   { background: #FEE2E2; color: #DC2626; }
    .status-message.info    { background: #DBEAFE; color: #2563EB; }
    
    .scanning { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, transparent, #10B981, transparent); animation: scan 2s linear infinite; }
    @keyframes scan { 0% { top: 0; } 50% { top: calc(100% - 4px); } 100% { top: 0; } }
    
    .success-animation { display: none; text-align: center; padding: 30px 10px; }
    .success-animation.show { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    .employee-avatar-large { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 5px solid var(--success); margin: 0 auto 16px; display: block; }
    .success-name    { font-size: 24px; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; }
    .success-action  { font-size: 20px; font-weight: 600; color: var(--success); margin-bottom: 12px; }
    .success-time    { font-size: 32px; font-weight: 700; color: var(--gray-700); margin-bottom: 8px; }
    .success-details { color: var(--gray-500); font-size: 14px; background: var(--gray-50); padding: 10px; border-radius: 8px; display: inline-block;}
    
    .auto-reset-bar { width: 100%; height: 4px; background: var(--gray-200); border-radius: 2px; margin-top: 24px; overflow: hidden; position: relative; }
    .auto-reset-progress { position: absolute; top: 0; left: 0; height: 100%; background: var(--primary); width: 100%; animation: shrink 4s linear forwards; }
    @keyframes shrink { from { width: 100%; } to { width: 0%; } }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="punch-container">
  <div class="logo-container">
    <img src="punchbook_logo.png" alt="Punch Book" class="logo" onerror="this.src='https://via.placeholder.com/170x60?text=PunchBook'">
  </div>
  <div class="punch-header">
    <h1>Punch Book</h1>
    <p>Auto Kiosk Mode</p>
    <div class="datetime-display">
      <div class="date" id="currentDate">Loading...</div>
      <div class="time" id="currentTime">--:--:--</div>
    </div>
  </div>
  <div class="punch-body">
    
    <!-- Camera Section -->
    <div class="camera-section" id="cameraSection">
      <div class="video-wrapper">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="scanning" id="scanningLine" style="display:none;"></div>
      </div>
      <div class="status-message loading" id="statusMessage">
        <i class="fas fa-spinner fa-spin"></i> Initializing System...
      </div>
    </div>

    <!-- Success / Result Section -->
    <div class="success-animation" id="successSection">
      <img id="resultAvatar" class="employee-avatar-large" src="" alt="Employee">
      <div class="success-name" id="resultName">Employee Name</div>
      <div class="success-action" id="resultAction">Punched IN</div>
      <div class="success-time" id="resultTime">00:00:00</div>
      <div class="success-details" id="resultDetails">Have a great day!</div>
      
      <div class="auto-reset-bar">
        <div class="auto-reset-progress" id="resetProgress"></div>
      </div>
      <p style="font-size: 12px; color: #6B7280; margin-top: 8px;">Ready for next scan in seconds...</p>
    </div>

  </div>
</div>

<script>
  // ============================================================
  //  ⚙️ Paste your Apps Script deployment URL below
  // ============================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxd3AesxUPpR2ubxWciUPObrjOU7ZKeUvw9FATARaD2Ff8FevUhwy3HfR9cAoKRElIl/exec';

  async function callAPI(action, params = {}) {
    const body = JSON.stringify({ action, ...params });
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body
    });
    if (!response.ok) throw new Error('Network error');
    return await response.json();
  }

  // ============================================================
  //  App State
  // ============================================================
  let videoStream = null;
  let faceDataList = [];
  let isProcessing = false;
  let detectionInterval = null;

  // ============================================================
  //  Init
  // ============================================================
  document.addEventListener('DOMContentLoaded', async () => {
    startClock();
    await loadModelsAndStart();
  });

  function startClock() {
    setInterval(() => {
      const now = new Date();
      document.getElementById('currentDate').textContent = now.toLocaleDateString('en-IN', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
      document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    }, 1000);
  }

  function updateStatus(type, html) {
    const el = document.getElementById('statusMessage');
    el.className = 'status-message ' + type;
    el.innerHTML = html;
  }

  // ============================================================
  //  Load Models & Start Camera
  // ============================================================
  async function loadModelsAndStart() {
    try {
      const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);

      updateStatus('loading', '<i class="fas fa-spinner fa-spin"></i> Fetching employee data...');
      const result = await callAPI('getAllFaceData');
      
      if (result.success) {
        faceDataList = result.faceData;
        startCamera();
      } else {
        updateStatus('error', '<i class="fas fa-exclamation-triangle"></i> ' + result.message);
      }
    } catch (error) {
      updateStatus('error', '<i class="fas fa-exclamation-triangle"></i> System Error: ' + error.message);
    }
  }

  async function startCamera() {
    try {
      videoStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
      const video = document.getElementById('video');
      video.srcObject = videoStream;
      video.onloadedmetadata = () => {
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        updateStatus('info', '<i class="fas fa-search"></i> Look at the camera to punch');
        document.getElementById('scanningLine').style.display = 'block';
        startFaceDetection();
      };
    } catch (error) {
      updateStatus('error', '<i class="fas fa-video-slash"></i> Camera access denied.');
    }
  }

  // ============================================================
  //  Detection & 1-to-N Matching
  // ============================================================
  function startFaceDetection() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    detectionInterval = setInterval(async () => {
      if (isProcessing) return;
      try {
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (detection) {
          const box = detection.detection.box;
          ctx.strokeStyle = '#10B981'; ctx.lineWidth = 3;
          ctx.strokeRect(box.x, box.y, box.width, box.height);

          // Find best match
          let bestMatch = null;
          let bestDistance = 0.52; // Strict threshold to prevent false positives in auto-mode
          
          for (const faceData of faceDataList) {
            const distance = faceapi.euclideanDistance(detection.descriptor, faceData.faceDescriptor);
            if (distance < bestDistance) {
              bestDistance = distance;
              bestMatch = faceData;
            }
          }

          if (bestMatch) {
            isProcessing = true;
            clearInterval(detectionInterval);
            
            // Snap photo
            const snap = document.createElement('canvas');
            snap.width = video.videoWidth; snap.height = video.videoHeight;
            snap.getContext('2d').drawImage(video, 0, 0);
            const capturedPhoto = snap.toDataURL('image/jpeg', 0.7);

            playBeep();
            updateStatus('loading', `<i class="fas fa-spinner fa-spin"></i> Hi ${bestMatch.empName}, processing punch...`);
            
            // Execute Auto Punch logic
            processAutoPunch(bestMatch, capturedPhoto);
          }
        }
      } catch (e) {}
    }, 300);
  }

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      osc.connect(ctx.destination);
      osc.frequency.setValueAtTime(800, ctx.currentTime);
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }

  // ============================================================
  //  Auto Punch Logic (The Magic)
  // ============================================================
  async function processAutoPunch(employee, photoBase64) {
    try {
      // 1. Check current status
      const statusRes = await callAPI('getTodayPunchStatus', { empId: employee.empId });
      
      let finalResult;
      let actionText;
      let detailsText;

      if (!statusRes.success) throw new Error(statusRes.message);

      // 2. Decide Action based on Status
      if (statusRes.hasPunchedIn && statusRes.hasPunchedOut) {
        // Already done for the day
        showResultScreen(employee, "Shift Completed", "Already punched out today.", statusRes.punchOut || "N/A", "info");
        return;
      } 
      else if (!statusRes.hasPunchedIn) {
        // Do Punch In
        finalResult = await callAPI('punchIn', { empId: employee.empId, empName: employee.empName, photoBase64 });
        actionText = "Punched IN";
        detailsText = finalResult.status === 'Late' ? '⚠️ Late arrival' : 'Have a great day!';
      } 
      else {
        // Do Punch Out
        finalResult = await callAPI('punchOut', { empId: employee.empId, photoBase64 });
        actionText = "Punched OUT";
        detailsText = `Total work hours: ${finalResult.workHours || 'N/A'} hrs`;
      }

      if (finalResult.success) {
        showResultScreen(employee, actionText, detailsText, finalResult.time, "success");
      } else {
        throw new Error(finalResult.message);
      }

    } catch (err) {
      updateStatus('error', '<i class="fas fa-times-circle"></i> ' + err.message);
      setTimeout(resetAndScan, 3000); // Reset on error
    }
  }

  // ============================================================
  //  Result Screen & Auto Reset
  // ============================================================
  function showResultScreen(emp, action, details, time, type) {
    document.getElementById('cameraSection').classList.add('hidden');
    
    const avatar = document.getElementById('resultAvatar');
    avatar.src = emp.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(emp.empName)}&background=3B82F6&color=fff&size=200`;
    avatar.style.borderColor = type === 'info' ? '#F59E0B' : '#10B981';
    
    document.getElementById('resultName').textContent = emp.empName;
    document.getElementById('resultAction').textContent = action;
    document.getElementById('resultAction').style.color = type === 'info' ? '#F59E0B' : '#10B981';
    document.getElementById('resultTime').textContent = time;
    document.getElementById('resultDetails').textContent = details;
    
    // Reset animation bar
    const progress = document.getElementById('resetProgress');
    progress.style.animation = 'none';
    progress.offsetHeight; /* trigger reflow */
    progress.style.animation = null;

    document.getElementById('successSection').classList.add('show');

    // Auto close and scan next person after 4 seconds
    setTimeout(resetAndScan, 4000);
  }

  function resetAndScan() {
    isProcessing = false;
    document.getElementById('successSection').classList.remove('show');
    document.getElementById('cameraSection').classList.remove('hidden');
    updateStatus('info', '<i class="fas fa-search"></i> Look at the camera to punch');
    startFaceDetection();
  }
</script>
</body>
</html>
